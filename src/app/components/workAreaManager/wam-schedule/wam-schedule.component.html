<div class="container-fluid">

  <!-- Encabezado -->
  <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
    <div>
      <h3 class="mb-1">Calendario de Ocupación</h3>
      <p class="text-muted mb-0">Visualiza la disponibilidad y ocupación de las áreas de trabajo</p>
    </div>
  </div>

  <!-- Filtros y navegación de semana -->
  <div class="card border-0 shadow-sm mb-3">
    <div class="card-body">
      <div class="row g-2 align-items-end">

        <!-- Filtro de área de trabajo -->
        <div class="col-12 col-md-4">
          <label for="workAreaFilter" class="form-label mb-1">Área de trabajo</label>
          <select id="workAreaFilter" class="form-select"
                  [(ngModel)]="selectedWorkAreaId"
                  (ngModelChange)="onWorkAreaChange()">
            <option [ngValue]="null">Todas las áreas</option>
            @for (area of workAreas; track area.pidareatrabajo) {
              <option [ngValue]="area.pidareatrabajo">
                {{ area.pareatrabajo }} — Nro. {{ area.pnumeroarea }}
              </option>
            }
          </select>
        </div>

        <!-- Navegación de semana -->
        <div class="col-12 col-md-8">
          <div class="d-flex align-items-center justify-content-md-end gap-2 flex-wrap">
            <button type="button" class="btn btn-outline-success btn-sm"
                    (click)="goToToday()">
              Hoy
            </button>
            <div class="btn-group btn-group-sm">
              <button type="button" class="btn btn-outline-secondary"
                      (click)="previousWeek()" aria-label="Semana anterior">
                <i class="bi bi-chevron-left"></i>
              </button>
              <button type="button" class="btn btn-outline-secondary"
                      (click)="nextWeek()" aria-label="Semana siguiente">
                <i class="bi bi-chevron-right"></i>
              </button>
            </div>
            <span class="fw-medium text-dark">{{ weekRangeLabel }}</span>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Tabla del calendario -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      @if (isLoading) {
        <div class="d-flex justify-content-center align-items-center py-5">
          <div class="spinner-border text-success" role="status">
            <span class="visually-hidden">Cargando...</span>
          </div>
        </div>
      } @else {
        <app-wam-schedule-table
          [occupancies]="occupancies"
          [days]="days"
          [timeSlots]="timeSlots"
          [isLoading]="isLoading">
        </app-wam-schedule-table>
      }
    </div>
  </div>

</div>
