<div class="em-overlay">
  <div class="em-modal">

    <!-- Banner rojo de emergencia -->
    <div class="em-banner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <div>
        <span class="em-banner-title">Base de datos no disponible</span>
        <span class="em-banner-sub">El sistema detectó que la base de datos está fuera de servicio.</span>
      </div>
    </div>

    <!-- Cuerpo del modal -->
    <div class="em-body">
      <div class="em-header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h2 class="em-title">Acceso de Emergencia</h2>
      <p class="em-subtitle">
        Solo el administrador del sistema puede acceder al modo de recuperación.
        Ingresa la contraseña de emergencia para continuar.
      </p>

      <form (ngSubmit)="onSubmit()" class="em-form">
        <div class="em-field">
          <label class="em-label">Contraseña de emergencia</label>
          <div class="em-input-wrap">
            <svg class="em-field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              [type]="showPassword() ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              class="em-input"
              placeholder="Contraseña de emergencia"
              autocomplete="off"
              [disabled]="isLoading()"
            />
            <button type="button" class="em-toggle-pwd" (click)="togglePassword()" tabindex="-1">
              @if (showPassword()) {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
        </div>

        @if (errorMessage()) {
          <div class="em-error">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {{ errorMessage() }}
          </div>
        }

        <button type="submit" class="em-btn-submit" [disabled]="!password || isLoading()">
          @if (isLoading()) {
            <span class="em-spinner"></span>
            <span>Verificando...</span>
          } @else {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <ellipse cx="12" cy="5" rx="9" ry="3"/>
              <path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/>
              <path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/>
            </svg>
            <span>Iniciar recuperación</span>
          }
        </button>
      </form>
    </div>

  </div>
</div>
